<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3d3834"/>
      <stop offset="50%"  stop-color="#4a4036"/>
      <stop offset="100%" stop-color="#3d3834"/>
    </linearGradient>

    <!-- Warm glow gradient -->
    <radialGradient id="glow1" cx="30%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b7355" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3d3834" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="70%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b5d54" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3d3834" stop-opacity="0"/>
    </radialGradient>

    <!-- Text gradient for TRAVIA -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f8f6f3"/>
      <stop offset="50%"  stop-color="#c8b99a"/>
      <stop offset="100%" stop-color="#f8f6f3"/>
    </linearGradient>

    <!-- Clip for progress line -->
    <clipPath id="lineClip">
      <rect x="0" y="0" width="0" height="4">
        <animate attributeName="width" from="0" to="200" dur="1.5s" begin="0.8s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>

  <!-- Glow overlays -->
  <rect width="900" height="300" fill="url(#glow1)"/>
  <rect width="900" height="300" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <g stroke="#8b7355" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="60"  x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Decorative corner lines top-left -->
  <g stroke="#8b7355" stroke-opacity="0.4" stroke-width="1" fill="none">
    <polyline points="20,20 20,50 50,50">
      <animate attributeName="stroke-opacity" from="0" to="0.4" dur="0.6s" begin="0.1s" fill="freeze"/>
    </polyline>
  </g>

  <!-- Decorative corner lines top-right -->
  <g stroke="#8b7355" stroke-opacity="0.4" stroke-width="1" fill="none">
    <polyline points="880,20 880,50 850,50">
      <animate attributeName="stroke-opacity" from="0" to="0.4" dur="0.6s" begin="0.1s" fill="freeze"/>
    </polyline>
  </g>

  <!-- Decorative corner lines bottom-left -->
  <g stroke="#8b7355" stroke-opacity="0.4" stroke-width="1" fill="none">
    <polyline points="20,280 20,250 50,250">
      <animate attributeName="stroke-opacity" from="0" to="0.4" dur="0.6s" begin="0.1s" fill="freeze"/>
    </polyline>
  </g>

  <!-- Decorative corner lines bottom-right -->
  <g stroke="#8b7355" stroke-opacity="0.4" stroke-width="1" fill="none">
    <polyline points="880,280 880,250 850,250">
      <animate attributeName="stroke-opacity" from="0" to="0.4" dur="0.6s" begin="0.1s" fill="freeze"/>
    </polyline>
  </g>

  <!-- Floating dots -->
  <g fill="#8b7355" fill-opacity="0.3">
    <circle cx="80"  cy="80"  r="2">
      <animate attributeName="cy" values="80;70;80"   dur="4s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="100" r="1.5">
      <animate attributeName="cy" values="100;90;100" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.3;0.5;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="220" r="1.5">
      <animate attributeName="cy" values="220;212;220" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="200" r="2">
      <animate attributeName="cy" values="200;192;200" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.3;0.6;0.3" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="50"  r="1.5">
      <animate attributeName="cy" values="50;43;50"   dur="6s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.2;0.4;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="260" r="1.5">
      <animate attributeName="cy" values="260;252;260" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.2;0.4;0.2" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Top tagline — fades in first -->
  <text
    x="450" y="100"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="5"
    fill="#a39382"
    opacity="0"
  >
    TRAVEL  ·  TRIVIA  ·  STORIES
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- Main title TRAVIA JOURNAL -->
  <text
    x="450" y="165"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="62"
    font-weight="300"
    letter-spacing="18"
    fill="url(#titleGrad)"
    opacity="0"
  >
    TRAVIA
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.4s" fill="freeze"/>
  </text>

  <!-- Subtitle JOURNAL -->
  <text
    x="455" y="195"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="14"
    font-weight="300"
    letter-spacing="12"
    fill="#c8b99a"
    opacity="0"
  >
    J O U R N A L
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.6s" fill="freeze"/>
  </text>

  <!-- Animated line LEFT side -->
  <rect x="250" y="215" width="0" height="1" fill="#8b7355" opacity="0.6">
    <animate attributeName="width" from="0" to="130" dur="1.2s" begin="0.8s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.6" dur="0.3s" begin="0.8s" fill="freeze"/>
  </rect>

  <!-- Center dot -->
  <circle cx="450" cy="215.5" r="2.5" fill="#8b7355" opacity="0">
    <animate attributeName="opacity" from="0" to="0.8" dur="0.4s" begin="1.4s" fill="freeze"/>
  </circle>

  <!-- Animated line RIGHT side -->
  <rect x="520" y="215" width="0" height="1" fill="#8b7355" opacity="0.6">
    <animate attributeName="width" from="0" to="130" dur="1.2s" begin="0.8s" fill="freeze"/>
    <animate attributeName="x" from="450" to="520" dur="1.2s" begin="0.8s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="0.6" dur="0.3s" begin="0.8s" fill="freeze"/>
  </rect>

  <!-- Bottom tagline -->
  <text
    x="450" y="250"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="300"
    letter-spacing="3"
    fill="#6b5d54"
    opacity="0"
  >
    by Joana Daphne Sy
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="1.2s" fill="freeze"/>
  </text>
</svg>