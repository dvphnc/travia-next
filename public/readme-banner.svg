<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2a2420"/>
      <stop offset="50%"  stop-color="#3d3834"/>
      <stop offset="100%" stop-color="#2a2420"/>
    </linearGradient>

    <!-- Warm amber glow center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#c8a97e" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#8b7355" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2a2420" stop-opacity="0"/>
    </radialGradient>

    <!-- Left warm blush -->
    <radialGradient id="leftBlush" cx="15%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#a07850" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2a2420" stop-opacity="0"/>
    </radialGradient>

    <!-- Right warm blush -->
    <radialGradient id="rightBlush" cx="85%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#6b5d54" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2a2420" stop-opacity="0"/>
    </radialGradient>

    <!-- Shimmer gradient for title -->
    <linearGradient id="titleShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8b99a"/>
      <stop offset="30%"  stop-color="#f8f6f3"/>
      <stop offset="60%"  stop-color="#e8ddd0"/>
      <stop offset="100%" stop-color="#c8b99a"/>
    </linearGradient>

    <!-- Line gradients -->
    <linearGradient id="lineL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b7355" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c8a97e" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lineR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8a97e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0"/>
    </linearGradient>

    <!-- Dot glow -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e8c99a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Color washes -->
  <rect width="900" height="320" fill="url(#centerGlow)"/>
  <rect width="900" height="320" fill="url(#leftBlush)"/>
  <rect width="900" height="320" fill="url(#rightBlush)"/>

  <!-- Grid texture -->
  <g stroke="#c8a97e" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="180" y1="0" x2="180" y2="320"/>
    <line x1="360" y1="0" x2="360" y2="320"/>
    <line x1="540" y1="0" x2="540" y2="320"/>
    <line x1="720" y1="0" x2="720" y2="320"/>
  </g>

  <!-- Corner brackets with warm color -->
  <polyline points="28,28 28,62 62,62" fill="none" stroke="#c8a97e" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" from="0" to="0.6" dur="0.5s" begin="0.2s" fill="freeze"/>
  </polyline>
  <polyline points="872,28 872,62 838,62" fill="none" stroke="#c8a97e" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" from="0" to="0.6" dur="0.5s" begin="0.2s" fill="freeze"/>
  </polyline>
  <polyline points="28,292 28,258 62,258" fill="none" stroke="#c8a97e" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" from="0" to="0.6" dur="0.5s" begin="0.2s" fill="freeze"/>
  </polyline>
  <polyline points="872,292 872,258 838,258" fill="none" stroke="#c8a97e" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" from="0" to="0.6" dur="0.5s" begin="0.2s" fill="freeze"/>
  </polyline>

  <!-- Floating particles with warm amber color -->
  <circle cx="100" cy="90" r="2" fill="#c8a97e" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="4s"   begin="1s"   repeatCount="indefinite"/>
    <animate attributeName="cy"      values="90;78;90"  dur="4s"   begin="1s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="110" r="1.5" fill="#e8c99a" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s"   begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="110;98;110" dur="5s"   begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="230" r="1.5" fill="#a07850" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="6s"   begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="230;220;230" dur="6s"   begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="240" r="2" fill="#c8b99a" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="4.5s" begin="2s"   repeatCount="indefinite"/>
    <animate attributeName="cy"      values="240;230;240" dur="4.5s" begin="2s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="55" r="1.5" fill="#e8c99a" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="7s"  begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="55;44;55"  dur="7s"  begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="80" r="1" fill="#c8a97e" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="5.5s" begin="3s"   repeatCount="indefinite"/>
    <animate attributeName="cy"      values="80;70;80"  dur="5.5s" begin="3s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="160" r="1" fill="#a07850" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="6.5s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="160;150;160" dur="6.5s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Eyebrow -->
  <text x="450" y="108" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10" font-weight="400" letter-spacing="6"
    fill="#a39382" opacity="0">
    A PERSONAL TRAVEL JOURNAL
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- Main title -->
  <text x="450" y="192" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="76" font-weight="200" letter-spacing="20"
    fill="url(#titleShimmer)" opacity="0">
    TRAVIA
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- Line left -->
  <rect x="128" y="213" height="1" fill="url(#lineL)" width="0">
    <animate attributeName="width" from="0" to="178" dur="1s" begin="0.9s" fill="freeze"/>
  </rect>

  <!-- Center diamond with glow -->
  <rect x="446" y="209" width="9" height="9" fill="url(#dotGlow)" opacity="0" transform="rotate(45 450.5 213.5)">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.6s" fill="freeze"/>
  </rect>

  <!-- Line right -->
  <rect x="594" y="213" height="1" fill="url(#lineR)" width="0">
    <animate attributeName="width" from="0" to="178" dur="1s" begin="0.9s" fill="freeze"/>
  </rect>

  <!-- Tagline with warm color -->
  <text x="450" y="252" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="12" font-weight="300" letter-spacing="4"
    fill="#c8a97e" opacity="0">
    travel smart  ·  trivia start
    <animate attributeName="opacity" from="0" to="0.95" dur="0.8s" begin="1.2s" fill="freeze"/>
  </text>

  <!-- Author -->
  <text x="450" y="286" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10" font-weight="300" letter-spacing="2.5"
    fill="#8b7355" opacity="0">
    by Joana Daphne Sy
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1.5s" fill="freeze"/>
  </text>
</svg>
