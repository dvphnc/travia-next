<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2e2b28"/>
      <stop offset="100%" stop-color="#3d3834"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#8b7355" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2e2b28" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleColor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e8e4df"/>
      <stop offset="40%"  stop-color="#f8f6f3"/>
      <stop offset="70%"  stop-color="#c8b99a"/>
      <stop offset="100%" stop-color="#e8e4df"/>
      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        values="-1 0; 1 0; -1 0"
        dur="5s"
        repeatCount="indefinite"
      />
    </linearGradient>
    <linearGradient id="lineLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b7355" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lineRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b7355" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>
  <rect width="900" height="320" fill="url(#spotlight)"/>

  <!-- Subtle grain texture lines -->
  <g stroke="#8b7355" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="180" y1="0" x2="180" y2="320"/>
    <line x1="360" y1="0" x2="360" y2="320"/>
    <line x1="540" y1="0" x2="540" y2="320"/>
    <line x1="720" y1="0" x2="720" y2="320"/>
  </g>

  <!-- Corner brackets - top left -->
  <polyline points="28,28 28,60 60,60" fill="none" stroke="#8b7355" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" from="0" to="0.5" dur="0.5s" begin="0.2s" fill="freeze"/>
  </polyline>

  <!-- Corner brackets - top right -->
  <polyline points="872,28 872,60 840,60" fill="none" stroke="#8b7355" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" from="0" to="0.5" dur="0.5s" begin="0.2s" fill="freeze"/>
  </polyline>

  <!-- Corner brackets - bottom left -->
  <polyline points="28,292 28,260 60,260" fill="none" stroke="#8b7355" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" from="0" to="0.5" dur="0.5s" begin="0.2s" fill="freeze"/>
  </polyline>

  <!-- Corner brackets - bottom right -->
  <polyline points="872,292 872,260 840,260" fill="none" stroke="#8b7355" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" from="0" to="0.5" dur="0.5s" begin="0.2s" fill="freeze"/>
  </polyline>

  <!-- Floating ambient particles -->
  <circle cx="100" cy="90"  r="1.5" fill="#c8b99a" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="90;78;90"  dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="110" r="1"   fill="#c8b99a" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="110;98;110" dur="5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="230" r="1"   fill="#8b7355" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="6s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="230;220;230" dur="6s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="240" r="1.5" fill="#8b7355" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="240;230;240" dur="4.5s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="55"  r="1"   fill="#c8b99a" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="7s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="55;46;55"  dur="7s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Eyebrow label -->
  <text x="450" y="108" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10" font-weight="400" letter-spacing="6"
    fill="#a39382" opacity="0">
    A PERSONAL TRAVEL JOURNAL
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- Main TRAVIA title -->
  <text x="450" y="190" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="76" font-weight="200" letter-spacing="20"
    fill="url(#titleColor)" opacity="0">
    TRAVIA
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- Line left -->
  <rect x="130" y="212" height="1" fill="url(#lineLeft)" width="0">
    <animate attributeName="width" from="0" to="175" dur="1s" begin="0.9s" fill="freeze"/>
  </rect>

  <!-- Center diamond -->
  <rect x="446" y="208" width="8" height="8" fill="#8b7355" opacity="0" transform="rotate(45 450 212)">
    <animate attributeName="opacity" from="0" to="0.7" dur="0.4s" begin="1.6s" fill="freeze"/>
  </rect>

  <!-- Line right -->
  <rect x="595" y="212" height="1" fill="url(#lineRight)" width="0">
    <animate attributeName="width" from="0" to="175" dur="1s" begin="0.9s" fill="freeze"/>
  </rect>

  <!-- Tagline -->
  <text x="450" y="250" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="12" font-weight="300" letter-spacing="4"
    fill="#c8b99a" opacity="0">
    travel smart  ·  trivia start
    <animate attributeName="opacity" from="0" to="0.9" dur="0.8s" begin="1.2s" fill="freeze"/>
  </text>

  <!-- Author credit -->
  <text x="450" y="284" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10" font-weight="300" letter-spacing="2.5"
    fill="#6b5d54" opacity="0">
    by Joana Daphne Sy
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1.5s" fill="freeze"/>
  </text>
</svg>
