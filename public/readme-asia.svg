<svg width="280" height="200" viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="asiaOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2a2420" stop-opacity="0.1"/>
      <stop offset="70%"  stop-color="#2a2420" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2a2420" stop-opacity="0.85"/>
    </linearGradient>
    <clipPath id="asiaClip">
      <rect width="280" height="200" rx="0"/>
    </clipPath>
  </defs>

  <image
    href="https://images.unsplash.com/photo-1528164344705-47542687000d?w=560&auto=format&fit=crop"
    width="280" height="200"
    clip-path="url(#asiaClip)"
    preserveAspectRatio="xMidYMid slice"
  >
    <animateTransform
      attributeName="transform"
      type="scale"
      values="1;1.04;1"
      dur="8s"
      repeatCount="indefinite"
      additive="sum"
    />
  </image>

  <rect width="280" height="200" fill="url(#asiaOverlay)"/>

  <!-- Top label -->
  <text x="14" y="26" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9" letter-spacing="3" fill="#c8a97e" opacity="0.9" font-weight="500">
    ASIA
  </text>

  <!-- Bottom content -->
  <text x="14" y="158" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="200" letter-spacing="2" fill="#f8f6f3">
    Asia
  </text>
  <text x="14" y="176" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9" letter-spacing="1" fill="#c8b99a" opacity="0.8">
    4 stories
  </text>

  <!-- Tags -->
  <rect x="14"  y="184" width="42" height="12" fill="#8b7355" fill-opacity="0.6" rx="1"/>
  <text x="17"  y="193" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" letter-spacing="0.5" fill="#f8f6f3">Japan</text>

  <rect x="60"  y="184" width="52" height="12" fill="#8b7355" fill-opacity="0.5" rx="1"/>
  <text x="63"  y="193" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" letter-spacing="0.5" fill="#f8f6f3">Indonesia</text>

  <rect x="116" y="184" width="54" height="12" fill="#8b7355" fill-opacity="0.4" rx="1"/>
  <text x="119" y="193" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" letter-spacing="0.5" fill="#f8f6f3">Thailand</text>
</svg>
