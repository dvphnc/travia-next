<svg width="900" height="6" viewBox="0 0 900 6" xmlns="http://www.w3.org/2000/svg">
  <!-- Left fade line -->
  <rect x="0" y="2" width="380" height="1" fill="url(#leftFade)"/>
  <!-- Center dot -->
  <circle cx="450" cy="3" r="2.5" fill="#8b7355" opacity="0.7"/>
  <!-- Right fade line -->
  <rect x="520" y="2" width="380" height="1" fill="url(#rightFade)"/>

  <defs>
    <linearGradient id="leftFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b7355" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b7355" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>