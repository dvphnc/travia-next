<svg width="900" height="16" viewBox="0 0 900 16" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b7355" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c8a97e" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="dRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8a97e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e8c99a"/>
      <stop offset="100%" stop-color="#a07850"/>
    </radialGradient>
  </defs>

  <!-- Left line -->
  <rect x="0" y="7" width="415" height="1" fill="url(#dLeft)"/>

  <!-- Center glowing diamond -->
  <rect x="446" y="4" width="8" height="8" fill="url(#dDot)" opacity="0.85" transform="rotate(45 450 8)"/>

  <!-- Right line -->
  <rect x="485" y="7" width="415" height="1" fill="url(#dRight)"/>
</svg>
